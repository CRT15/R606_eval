name: CI - Tests PHP

on:
  push:
    branches:
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Compose
        run: docker compose version

      - name: Build et lancement des containers
        run: docker compose up -d --build

      - name: Attendre que l'application soit prête
        run: |
          echo "Attente du démarrage..."
          for i in {1..15}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Application prête !"
              break
            fi
            sleep 5
          done

      - name: Installation des dépendances Composer
        run: docker exec php_web composer install

      - name: Exécution des tests
        run:  docker exec php_web ./vendor/bin/phpunit tests

      - name: Stop containers
        if: always()
        run: docker compose down